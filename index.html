<!-- redeploy test -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>三合鏡 — 外三合ビューア</title>
<style>
  :root{
    --ink:#15171b;         /* 墨 */
    --surface:#1e2127;
    --line:#2c3038;
    --text:#ece7db;        /* 生成り */
    --text-dim:#9a958a;
    --seal:#b8503c;        /* 印肉の朱(ロゴのみ) */
    --good:#5ec98f;
    --mid:#e0b74a;
    --bad:#e2654f;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--ink);color:var(--text);
    font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;
    font-size:15px;line-height:1.6;}
  body{max-width:640px;margin:0 auto;padding:14px 14px calc(20px + env(safe-area-inset-bottom));}

  /* ---------- header ---------- */
  header{display:flex;align-items:center;gap:12px;padding:6px 2px 16px;}
  .seal{width:34px;height:34px;flex:none;border-radius:6px;background:var(--seal);
    color:#f5efe2;display:grid;place-items:center;
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:19px;font-weight:600;}
  .title-block{position:relative;padding-left:14px;}
  .title-block::before{ /* 中定の垂線 */
    content:"";position:absolute;left:0;top:2px;bottom:2px;width:1px;
    background:linear-gradient(var(--text-dim),transparent);}
  h1{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    font-size:22px;font-weight:600;letter-spacing:.14em;}
  .subtitle{font-size:11.5px;color:var(--text-dim);letter-spacing:.06em;}

  /* ---------- setup / status ---------- */
  #setup{border:1px dashed var(--line);border-radius:12px;padding:26px 18px;
    text-align:center;background:var(--surface);}
  #status{color:var(--text-dim);font-size:13px;margin-bottom:14px;min-height:1.4em;}
  .file-btn{display:inline-block;background:var(--text);color:var(--ink);
    border:none;border-radius:10px;padding:12px 22px;font-size:15px;font-weight:600;
    cursor:pointer;}
  .file-btn[disabled]{opacity:.4;}
  #file{display:none;}

  /* ---------- stage ---------- */
  #stage{display:none;position:relative;border-radius:12px;overflow:hidden;
    background:#000;margin-bottom:12px;}
  #stage.on{display:block;}
  #video{display:block;width:100%;height:auto;}
  #canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}

  /* ---------- chips ---------- */
  #chips{display:none;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
  #chips.on{display:flex;}
  .chip{flex:1;min-width:88px;background:var(--surface);border:1px solid var(--line);
    border-radius:9px;padding:6px 8px;text-align:center;}
  .chip .side{font-size:10px;color:var(--text-dim);letter-spacing:.08em;}
  .chip .val{font-size:13.5px;font-weight:600;}
  .chip .dot{display:inline-block;width:8px;height:8px;border-radius:50%;
    margin-right:5px;background:var(--text-dim);vertical-align:1px;}

  /* ---------- transport ---------- */
  #transport{display:none;}
  #transport.on{display:block;}
  #seek{width:100%;accent-color:var(--text);height:26px;}
  .timecode{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-size:12px;color:var(--text-dim);text-align:center;margin:2px 0 10px;}
  .row{display:flex;gap:8px;justify-content:center;align-items:center;margin-bottom:10px;}
  .ctl{background:var(--surface);border:1px solid var(--line);color:var(--text);
    border-radius:10px;font-size:14px;padding:10px 0;flex:1;cursor:pointer;}
  .ctl:active{background:var(--line);}
  .ctl.play{flex:1.6;font-weight:700;font-size:15px;}
  .seg{display:flex;flex:2.2;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .seg button{flex:1;background:var(--surface);border:none;color:var(--text-dim);
    padding:10px 0;font-size:13px;cursor:pointer;}
  .seg button.active{background:var(--text);color:var(--ink);font-weight:700;}

  /* ---------- toggles ---------- */
  #toggles{display:none;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  #toggles.on{display:flex;}
  .tgl{flex:1;min-width:70px;background:var(--surface);border:1px solid var(--line);
    color:var(--text-dim);border-radius:10px;padding:9px 0;font-size:13px;
    text-align:center;cursor:pointer;user-select:none;}
  .tgl.active{color:var(--text);border-color:var(--text-dim);font-weight:600;}

  footer{font-size:11.5px;color:var(--text-dim);line-height:1.7;padding:4px 2px;}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin:0 3px 0 8px;vertical-align:-1px;}
  @media (prefers-reduced-motion:no-preference){
    #setup,.chip{transition:opacity .25s;}
  }
</style>
</head>
<body>

<header>
  <div class="seal">合</div>
  <div class="title-block">
    <h1>三合鏡</h1>
    <div class="subtitle">外三合を映す鏡 — 肩胯・肘膝・手足</div>
  </div>
</header>

<div id="setup">
  <div id="status">AIモデルを読み込んでいます…</div>
  <label class="file-btn" id="fileBtn">練習動画を選ぶ<input type="file" id="file" accept="video/*"></label>
</div>

<div id="stage">
  <video id="video" playsinline muted preload="metadata"></video>
  <canvas id="canvas"></canvas>
</div>

<div id="chips"></div>

<div id="transport">
  <input type="range" id="seek" min="0" max="0" step="0.01" value="0">
  <div class="timecode"><span id="tcur">0:00.0</span> / <span id="tdur">0:00.0</span></div>
  <div class="row">
    <button class="ctl" id="stepBack">−1コマ</button>
    <button class="ctl play" id="play">▶ 再生</button>
    <button class="ctl" id="stepFwd">＋1コマ</button>
  </div>
  <div class="row">
    <div class="seg" id="speedSeg">
      <button data-s="1" class="active">1×</button>
      <button data-s="0.5">0.5×</button>
      <button data-s="0.25">0.25×</button>
    </div>
    <button class="ctl" id="mute" style="flex:.9">🔇</button>
    <button class="ctl" id="reload" style="flex:.9">動画変更</button>
  </div>
</div>

<div id="toggles">
  <div class="tgl active" data-k="left">左側</div>
  <div class="tgl active" data-k="right">右側</div>
  <div class="tgl active" data-k="skeleton">骨格</div>
  <div class="tgl active" data-k="center">中定線</div>
</div>

<footer>
  線の色は目安です<span class="legend"><i style="background:var(--good)"></i>揃う<i style="background:var(--mid)"></i>注意<i style="background:var(--bad)"></i>大きなズレ</span>。
  正面または真横からの撮影が最も判定しやすくなります。中定線は肩の中点と胯の中点を結んだ垂線(立身中正の目安)です。
</footer>

<script type="module">
import { PoseLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const $ = id => document.getElementById(id);
const video = $("video"), canvas = $("canvas"), ctx = canvas.getContext("2d");
const statusEl = $("status");

/* ---- landmarks ---- */
const IDX = {
  left:  { shoulder:11, elbow:13, wrist:15, hip:23, knee:25, ankle:27 },
  right: { shoulder:12, elbow:14, wrist:16, hip:24, knee:26, ankle:28 },
};
const PAIRS = [
  { key:"sh", label:"肩胯", a:"shoulder", b:"hip"   },
  { key:"el", label:"肘膝", a:"elbow",    b:"knee"  },
  { key:"wr", label:"手足", a:"wrist",    b:"ankle" },
];
/* torso 長に対する水平ズレの比。暫定しきい値 */
const TH_GOOD = 0.28, TH_MID = 0.55;
/* 中定線の傾き(度) */
const TILT_GOOD = 4, TILT_MID = 8;

const CSS = getComputedStyle(document.documentElement);
const C = {
  good: CSS.getPropertyValue("--good").trim(),
  mid:  CSS.getPropertyValue("--mid").trim(),
  bad:  CSS.getPropertyValue("--bad").trim(),
  dim:  "rgba(236,231,219,.28)",
};

const state = { left:true, right:true, skeleton:true, center:true };
let landmarker = null, ready = false, lm = null, rafId = 0;

/* ---- chips DOM ---- */
const chipsEl = $("chips");
const chipRefs = {};
for (const side of ["left","right"]) {
  for (const p of PAIRS) {
    const el = document.createElement("div");
    el.className = "chip";
    el.innerHTML = `<div class="side">${side==="left"?"左":"右"}</div>
      <div class="val"><span class="dot"></span>${p.label} <span class="num">—</span></div>`;
    chipsEl.appendChild(el);
    chipRefs[side+p.key] = { el, dot: el.querySelector(".dot"), num: el.querySelector(".num") };
  }
}

/* ---- model ---- */
async function initModel() {
  try {
    const fileset = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
    const opts = delegate => ({
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_full/float16/1/pose_landmarker_full.task",
        delegate,
      },
      runningMode: "VIDEO",
      numPoses: 1,
    });
    try { landmarker = await PoseLandmarker.createFromOptions(fileset, opts("GPU")); }
    catch { landmarker = await PoseLandmarker.createFromOptions(fileset, opts("CPU")); }
    ready = true;
    statusEl.textContent = "準備ができました。練習動画を選んでください。";
  } catch (e) {
    statusEl.textContent = "モデルの読み込みに失敗しました。通信環境を確認して再読み込みしてください。";
    console.error(e);
  }
}
initModel();

/* ---- video loading ---- */
$("file").addEventListener("change", e => {
  const f = e.target.files[0];
  if (!f) return;
  video.src = URL.createObjectURL(f);
  video.load();
});
video.addEventListener("loadedmetadata", () => {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  $("seek").max = video.duration;
  $("tdur").textContent = fmt(video.duration);
  $("setup").style.display = "none";
  $("stage").classList.add("on");
  chipsEl.classList.add("on");
  $("transport").classList.add("on");
  $("toggles").classList.add("on");
  seekDetect();
});
$("reload").addEventListener("click", () => {
  video.pause();
  $("file").value = "";
  $("file").click();
});

/* ---- detection ---- */
function detect() {
  if (!ready || video.readyState < 2) return;
  try {
    const res = landmarker.detectForVideo(video, performance.now());
    lm = (res.landmarks && res.landmarks[0]) ? res.landmarks[0] : null;
  } catch (e) { /* keep previous frame */ }
  draw();
  updateChips();
}
function seekDetect(){ requestAnimationFrame(() => detect()); }

function loop() {
  detect();
  syncSeek();
  if (!video.paused && !video.ended) {
    rafId = "requestVideoFrameCallback" in video
      ? video.requestVideoFrameCallback(loop)
      : requestAnimationFrame(loop);
  } else {
    setPlayLabel();
  }
}

/* ---- geometry helpers ---- */
const px = p => [p.x * canvas.width, p.y * canvas.height];
function midpoint(a,b){ return [(a[0]+b[0])/2,(a[1]+b[1])/2]; }
function torsoLen() {
  const s = midpoint(px(lm[IDX.left.shoulder]), px(lm[IDX.right.shoulder]));
  const h = midpoint(px(lm[IDX.left.hip]),      px(lm[IDX.right.hip]));
  return Math.max(1, Math.hypot(s[0]-h[0], s[1]-h[1]));
}
function pairRatio(side, p) {
  const a = px(lm[IDX[side][p.a]]), b = px(lm[IDX[side][p.b]]);
  return Math.abs(a[0]-b[0]) / torsoLen();
}
const ratioColor = r => r < TH_GOOD ? C.good : r < TH_MID ? C.mid : C.bad;

/* ---- drawing ---- */
const BONES = [
  ["left","shoulder","right","shoulder"], ["left","hip","right","hip"],
  ["left","shoulder","left","elbow"], ["left","elbow","left","wrist"],
  ["right","shoulder","right","elbow"], ["right","elbow","right","wrist"],
  ["left","shoulder","left","hip"], ["right","shoulder","right","hip"],
  ["left","hip","left","knee"], ["left","knee","left","ankle"],
  ["right","hip","right","knee"], ["right","knee","right","ankle"],
];
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if (!lm) return;
  const w = Math.max(2, canvas.width/360);

  if (state.skeleton) {
    ctx.strokeStyle = C.dim; ctx.lineWidth = w; ctx.lineCap = "round";
    for (const [s1,k1,s2,k2] of BONES) {
      const a = px(lm[IDX[s1][k1]]), b = px(lm[IDX[s2][k2]]);
      ctx.beginPath(); ctx.moveTo(a[0],a[1]); ctx.lineTo(b[0],b[1]); ctx.stroke();
    }
  }

  if (state.center) {
    const s = midpoint(px(lm[IDX.left.shoulder]), px(lm[IDX.right.shoulder]));
    const h = midpoint(px(lm[IDX.left.hip]),      px(lm[IDX.right.hip]));
    const tilt = Math.abs(Math.atan2(h[0]-s[0], h[1]-s[1]) * 180/Math.PI);
    ctx.strokeStyle = tilt < TILT_GOOD ? C.good : tilt < TILT_MID ? C.mid : C.bad;
    ctx.lineWidth = w; ctx.setLineDash([w*3, w*3]);
    const dx = h[0]-s[0], dy = h[1]-s[1];
    ctx.beginPath();
    ctx.moveTo(s[0]-dx*0.7, s[1]-dy*0.7);
    ctx.lineTo(h[0]+dx*0.7, h[1]+dy*0.7);
    ctx.stroke(); ctx.setLineDash([]);
  }

  for (const side of ["left","right"]) {
    if (!state[side]) continue;
    for (const p of PAIRS) {
      const a = px(lm[IDX[side][p.a]]), b = px(lm[IDX[side][p.b]]);
      const col = ratioColor(pairRatio(side,p));
      ctx.strokeStyle = col; ctx.lineWidth = w*1.8;
      ctx.beginPath(); ctx.moveTo(a[0],a[1]); ctx.lineTo(b[0],b[1]); ctx.stroke();
      ctx.fillStyle = col;
      for (const pt of [a,b]) {
        ctx.beginPath(); ctx.arc(pt[0],pt[1],w*2.4,0,Math.PI*2); ctx.fill();
      }
    }
  }
}

function updateChips() {
  for (const side of ["left","right"]) {
    for (const p of PAIRS) {
      const ref = chipRefs[side+p.key];
      ref.el.style.opacity = state[side] ? 1 : .3;
      if (!lm) { ref.num.textContent = "—"; ref.dot.style.background = "var(--text-dim)"; continue; }
      const r = pairRatio(side,p);
      ref.num.textContent = r.toFixed(2);
      ref.dot.style.background = ratioColor(r);
    }
  }
}

/* ---- transport ---- */
const playBtn = $("play");
function setPlayLabel(){ playBtn.textContent = (video.paused||video.ended) ? "▶ 再生" : "❚❚ 停止"; }
playBtn.addEventListener("click", async () => {
  if (video.paused || video.ended) { await video.play(); loop(); }
  else video.pause();
  setPlayLabel();
});
const FRAME = 1/30;
$("stepBack").addEventListener("click", () => step(-FRAME));
$("stepFwd").addEventListener("click", () => step(+FRAME));
function step(d) {
  video.pause(); setPlayLabel();
  video.currentTime = Math.min(Math.max(0, video.currentTime + d), video.duration||0);
}
video.addEventListener("seeked", () => { seekDetect(); syncSeek(); });

const seek = $("seek");
let scrubbing = false;
seek.addEventListener("input", () => {
  scrubbing = true;
  video.pause(); setPlayLabel();
  video.currentTime = parseFloat(seek.value);
});
seek.addEventListener("change", () => { scrubbing = false; });
function syncSeek() {
  if (!scrubbing) seek.value = video.currentTime;
  $("tcur").textContent = fmt(video.currentTime);
}
function fmt(t) {
  t = t || 0;
  const m = Math.floor(t/60), s = (t%60).toFixed(1).padStart(4,"0");
  return `${m}:${s}`;
}

$("speedSeg").addEventListener("click", e => {
  const b = e.target.closest("button"); if (!b) return;
  video.playbackRate = parseFloat(b.dataset.s);
  for (const x of $("speedSeg").children) x.classList.toggle("active", x===b);
});
$("mute").addEventListener("click", () => {
  video.muted = !video.muted;
  $("mute").textContent = video.muted ? "🔇" : "🔊";
});

/* ---- toggles ---- */
$("toggles").addEventListener("click", e => {
  const t = e.target.closest(".tgl"); if (!t) return;
  const k = t.dataset.k;
  state[k] = !state[k];
  t.classList.toggle("active", state[k]);
  draw(); updateChips();
});
</script>
</body>
</html>
